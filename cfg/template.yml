## Pipeline metadata

name: Graphomic Pipeline Template
desc: This is the template for the management and correct usage of the Graphomics pipeline.
pipeline_version: 0.0.1

## Input images or volumes

mask_filepath: /path/to/the/binary_mask/dcm_or_nii_scan
# [Optional]
# The skeleton file can be pre-computed and pass to the
# feature extraction step
skeleton_filepath: /path/to/the/skeleton_mask/dcm_or_nii_scan
# [Optional]
# The label map can be used for the evaluation of the
# weights in the skeleton graph
label_filepath: /path/to/the/possible/labelmap/dcm_or_nii_scan
# [Optional]
# verify the correctness of the provided inputs in terms
# of metadata (sizing and spacing)
# This is just a safety check
check_consistency: True
# [Optional]
# set the number of threads to use during the evaluation
# if the SimpleITK filter support the feature
nth: 1
# [Optional]
# force the binarization of the input mask/skeleton
# considering all the no-null values as signal
binarize_input: True
# [Optional]
# force the resampling of the input mask to an equal
# spacing in all direction
# This is useful when we want to evaluate the network
# weights according to the length of the edge paths, since
# in this way we can ensure a correct computation
equal_spacing: True
# [Optional]
# force the cropping of the input mask according
# to the minimum bounding box around the object
crop_input : True
# [Optional]
# Minimum number of points for the identification of a surface in
# the binary skeleton. This is an internal parameter of the
# skeleton graph extractor filter
surface_min_points: 8
# [Optional]
# In case of "surface edges" found in the 3D skeleton, turning on this
# parameter, the related connected component can be discarded by the
# skeleton and by the graph extraction procedure.
# This is an internal parameter of the skeleton graph extractor filter
remove_surface: False

## Graphomics Weight estimation

# The skeleton graph could be processed considering the topological
# structure (i.e. all edge-weights set as 1), or weighing the edges
# according to pre-defined or custom metrics.
# All the custom metrics must be defined according to the structure
# defined in the `graphomics/_graph.py` file.
# In this template we will set only the pre-defined implementations

#graph_weights: NodePairwiseDistanceFilter
graph_weights: EdgeLengthPathsFilter
#graph_weights: EdgeLabelWeightFilter

# [Optional]
# set the internal parameters of the weight extractor filter
# to use during the evaluation
EdgeLabelWeightFilterParameters:
  metric: average

# enable network weights during feature evaluation
enable_weighted_features: True

## Graphomics Features

# Each type of graphomic features could be enabled/disabled
# If no other parameters are set, the entire list of available
# graphomics features will be extracted with the default parameters.
# The single graphomic feature could be enabled/disabled
# and customized setting all the inner parameters using
# the appropriated keywords
# The list of inner parameters of each filter can be set using
# as key the name of the filter followed by Parameters, e.g.
#             `FilterNameParameter:`

## Graphomics Topological features

enable_topology_features: True # enable topology features

# [Optional]
# specify the list of desired graphomics features
# to extract

# list of available topology features
topology:
  NumberOfNodes: True
  NumberOfEdges: True
  EdgeWeights: True
  EulerNumber: True
  NumberOfPendantNodes: True
  NumberOfConnectedComponents: True
  ModularityScore: True
  NumberOfMaximalCliques: True

# [Optional]
# nested parameters of each filter
EulerNumberParameters:
  connectivity: null

## Graphomics Spatial features

enable_spatial_features: True # enable spatial features

# [Optional]
# specify the list of desired graphomics features
# to extract

# list of available spatial features
spatial:
  NodeDensityStatistics: True
  FractalDimension: True
  AverageShortestPathLength: True
  Eccentricity: True
  CenterOfMass: True
  DistanceMostCentralNodes: True
  DistanceNoPendantNodes: True
  DistancePendantNodes: True

# [Optional]
# nested parameters of each filter
FractalDimensionParameters:
  max_box_size : null
  min_box_size : 1
  n_samples : 10
  n_offsets : 0

# [Optional]
# nested parameters of each filter
DistanceMostCentralNodesParameters:
  topk: 10

## Graphomics Centrality features

enable_centrality_features: True # enable centrality features

# [Optional]
# specify the list of desired graphomics features
# to extract

# list of available centrality features
centrality:
  NodeDegreeCentrality: True
  NodeBetweennessCentrality: True
  NodeClusteringCoefficient: True
  NodeClosenessCentrality: True
  NodePageRankCentrality: True
  NodeHarmonicCentrality: True
